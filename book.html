<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{ bookname }} - Flipbook</title>

    <style>
      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: linear-gradient(135deg, #e9edf3, #d8dee8);
        min-height: 100vh;
      }

      .topbar {
        background: #111;
        color: white;
        padding: 16px 24px;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .topbar h2 {
        margin: 0;
        font-size: 24px;
      }

      .topbar a {
        text-decoration: none;
        color: white;
        background: #333;
        padding: 10px 16px;
        border-radius: 8px;
      }

      .viewer-section {
        padding: 30px 20px 10px;
      }

      .controls {
        text-align: center;
        margin-bottom: 18px;
      }

      .controls button {
        padding: 10px 18px;
        margin: 0 8px;
        border: none;
        border-radius: 8px;
        background: #111;
        color: white;
        font-size: 14px;
        cursor: pointer;
      }

      .controls button:hover {
        background: #333;
      }

      .page-count {
        text-align: center;
        font-weight: bold;
        margin-bottom: 20px;
        color: #222;
      }

      .flipbook-wrapper {
        display: flex;
        justify-content: center;
        align-items: center;
        overflow: auto;
        padding-bottom: 30px;
      }

      #flipbook {
        margin: 0 auto;
      }

      #flipbook .page {
        background: white;
        overflow: hidden;
        box-shadow: 0 10px 24px rgba(0, 0, 0, 0.18);
      }

      #flipbook .page img {
        width: 100%;
        height: 100%;
        object-fit: contain;
        display: block;
        background: white;
      }
    </style>
  </head>
  <body>
    <div class="topbar">
      <h2>{{ bookname }}</h2>
      <a href="{{ url_for('try_page') }}">Back</a>
    </div>

    <div class="viewer-section">
      <div class="controls">
        <button onclick="prevPage()">Previous</button>
        <button onclick="nextPage()">Next</button>
      </div>

      <div class="page-count">
        <span id="page-number">Page 1</span>
      </div>

      <div class="flipbook-wrapper">
        <div id="flipbook">
          {% for page in pages %}
          <div class="page">
            <img
              src="{{ url_for('static', filename='books/' + bookname + '/' + page) }}"
              alt="Page {{ loop.index }}"
            />
          </div>
          {% endfor %}
        </div>
      </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/turn.js/3/turn.min.js"></script>

    <script>
      const singleWidth = 500;
      const pageHeight = 650;

      function updateBookDisplay(page) {
        if (page === 1) {
          $("#flipbook").turn("display", "single");
          $("#flipbook").turn("size", singleWidth, pageHeight);
        } else {
          $("#flipbook").turn("display", "double");
          $("#flipbook").turn("size", singleWidth * 2, pageHeight);
        }

        document.getElementById("page-number").innerText = "Page " + page;
      }

      $(document).ready(function () {
        $("#flipbook").turn({
          width: singleWidth,
          height: pageHeight,
          autoCenter: true,
          display: "single",
          gradients: true,
          acceleration: true,
          elevation: 50,
          when: {
            turning: function (event, page) {
              if (page === 1) {
                $("#flipbook").turn("display", "single");
                $("#flipbook").turn("size", singleWidth, pageHeight);
              } else {
                $("#flipbook").turn("display", "double");
                $("#flipbook").turn("size", singleWidth * 2, pageHeight);
              }
            },
            turned: function (event, page) {
              updateBookDisplay(page);
            },
          },
        });

        updateBookDisplay(1);
      });

      function nextPage() {
        $("#flipbook").turn("next");
      }

      function prevPage() {
        $("#flipbook").turn("previous");
      }
    </script>
  </body>
</html>
